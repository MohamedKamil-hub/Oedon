name: Oedon Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: ShellCheck scripts
        run: |
          # Validamos que tus scripts de automatización no tengan errores sintácticos
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh || echo "Warnings en scripts detectados"

  deploy:
    name: Production Deployment
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y hping3 # Para enviar el paquete UDP de knocking

      - name: Open Firewall (Port Knocking)
        run: |
          # Simulamos el 'toque' que espera tu portero.py
          # Enviamos el secreto al puerto UDP 62201
          echo -n "${{ secrets.PORTERO_SECRET }}" | nc -u -w1 ${{ secrets.SSH_HOST }} 62201
          echo "🚪 Puerta abierta (teóricamente) por 60 segundos"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222 # Tu puerto SSH personalizado
          script: |
            cd ~/Oedon
            git pull origin main
            
            # Recargar configuración usando tus plantillas e inyectando .env
            # Esto es lo que hace a Oedon "Invisible" y basado en IaC
            ./scripts/setup-nginx.sh 
            
            # Reiniciar servicios sin downtime agresivo
            docker compose up -d --remove-orphans
            
            # Limpieza de imágenes antiguas para ahorrar espacio (Cultura DevOps)
            docker image prune -f

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ Fallo en el despliegue de Oedon. Revisa los logs en GitHub Actions."
