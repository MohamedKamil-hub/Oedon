volumes:
  wordpress_data:
    name: oedon_universal_wp_data
services:
  nginx-proxy:
    image: nginx:alpine
    container_name: oedon-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - /var/log/oedon/nginx:/var/log/nginx:rw
      - wordpress_data:/var/www/html:ro
    networks:
      - oedon-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: oedon-certbot
    volumes:
      - ./data/certbot/www:/var/www/certbot:rw
      - ./data/certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'echo Certbot ready && exit 0'"
    networks:
      - oedon-network

  static-web:
    image: nginx:alpine
    container_name: oedon-static
    restart: unless-stopped
    volumes:
      - ./apps/static-web/html:/usr/share/nginx/html:ro
      - ./logs/static:/var/log/nginx:rw
    networks:
      - oedon-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  wordpress-db:
    image: mariadb:10.6
    container_name: wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - oedon-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  oedon-network:
    external: true
