services:
  nginx-proxy:
    image: nginx:alpine
    container_name: oedon-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx:rw
    networks:
      - oedon-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  static-web:
    image: nginx:alpine
    container_name: oedon-static
    restart: unless-stopped
    volumes:
      - ./apps/static-web/html:/usr/share/nginx/html:ro
      - ./logs/static:/var/log/nginx:rw
    networks:
      - oedon-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oedon-network:
    external: true
